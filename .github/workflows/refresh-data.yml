name: Refresh data

# Keeps the sourced datasets current with ZERO manual work. Runs monthly, re-pulls
# the leaderboards/memberships from Wikipedia & Wikidata, then — crucially — only
# commits if the full build AND test suite pass. So a source-site layout change or
# a flaky fetch can never ship broken/blank data to the live site: the gate fails,
# nothing is committed, and the last-good data stays put until a parser is fixed.
#
# What refreshes automatically:
#   • Higher or Lower / 501 goal leaderboards  (scripts/build-leaderboards.mjs)
#   • World Cup winning squads                  (import-wc-squads.mjs)
#   • Tic-Tac-Toe / Connections club+nation+trophy membership (import-all.mjs)
#   • Teammates & Career Path club histories    (import-teammates / import-careers)
#
# Each refresher is fault-tolerant: if one source is down it's skipped and its
# previous data is kept, while the others still update. On success it commits and
# Render auto-deploys. Trigger manually any time: Actions → Refresh data → Run.

on:
  schedule:
    - cron: '17 4 1 * *'   # 04:17 UTC on the 1st of each month
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # ── Refreshers (fault-tolerant: a failing source keeps its last-good data) ──
      - name: Goal leaderboards (Higher or Lower / 501)
        continue-on-error: true
        run: node scripts/build-leaderboards.mjs
      - name: World Cup winning squads
        continue-on-error: true
        run: node scripts/wikidata/import-wc-squads.mjs
      - name: Club / nation / trophy membership
        continue-on-error: true
        run: node scripts/wikidata/import-all.mjs
      - name: Career paths
        continue-on-error: true
        run: node scripts/wikidata/import-careers.mjs
      - name: Teammates
        continue-on-error: true
        run: node scripts/wikidata/import-teammates.mjs

      # ── The safety gate: nothing ships unless the build AND tests pass ──
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

      # ── Commit + push only if something actually changed (Render auto-deploys) ──
      - name: Commit refreshed data
        run: |
          if git diff --quiet -- src/data; then
            echo "No data changes — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data
          git commit -m "chore(data): monthly automated refresh of sourced datasets"
          git push
