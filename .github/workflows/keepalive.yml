name: Keep alive

# Render's free tier spins the service down after ~15 minutes of inactivity,
# and the 30–60s cold start makes Googlebot (and users) hit a slow/failed
# response — which is why Search Console reports the sitemap "couldn't fetch".
# This pings the site on a schedule so it stays awake. GitHub may delay
# scheduled runs, so for best reliability also add an external monitor
# (e.g. UptimeRobot, free, 5-minute interval) hitting the same URL.

on:
  schedule:
    - cron: '*/10 * * * *' # every ~10 minutes
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake the site
        run: |
          curl -fsS --max-time 90 https://footballtriviagames.onrender.com/ > /dev/null && echo "home ok"
          curl -fsS --max-time 90 https://footballtriviagames.onrender.com/sitemap.xml > /dev/null && echo "sitemap ok"
