name: Keep alive

# CRITICAL: Render's free tier spins the service down after ~15 min idle. While
# it is suspended, Render serves a default "User-agent: * / Disallow: /"
# robots.txt — which BLOCKS the whole site from Google. (When the app is awake it
# serves our real Allow-all robots.txt.) So if the site sleeps, Googlebot sees
# Disallow and won't crawl. This pings the site to keep it awake.
#
# GitHub's scheduler is NOT reliable enough on its own (runs can be delayed past
# the 15-min sleep window). You MUST also add an external monitor — UptimeRobot
# or cron-job.org, free, 5-minute interval — hitting the same URL. The bulletproof
# fix is Render's paid tier (never sleeps).
#
# During/after the domain switch we ping BOTH URLs: the onrender URL always
# routes to the Render service (guaranteeing it wakes even before custom-domain
# DNS/SSL is live), and the primary triviverse.com URL warms the public path
# once it resolves. Each ping is independent, so one failing doesn't stop the
# other. Once the migration is settled you can drop the onrender RENDER_URL.

env:
  PRIMARY: https://triviverse.com
  RENDER_URL: https://footballtriviagames.onrender.com

on:
  schedule:
    - cron: '*/5 * * * *' # every ~5 minutes (GitHub may still delay these)
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake the site
        run: |
          curl -fsS --max-time 90 "$RENDER_URL/" > /dev/null && echo "render home ok" || echo "render ping failed"
          curl -fsS --max-time 90 "$PRIMARY/" > /dev/null && echo "primary home ok" || echo "primary ping failed (DNS not live yet?)"
          curl -fsS --max-time 90 "$PRIMARY/sitemap.xml" > /dev/null && echo "primary sitemap ok" || true
